name: tourism_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2.0

environment:
  sdk: 2.0.0+3

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.0+2
  record: ^5.2.1
  path_provider: ^2.1.4
  video_player: ^2.9.1
  audioplayers: ^6.0.0
  flutter_rating_bar: ^4.0.1
  geolocator: ^11.0.0
  shared_preferences: ^2.2.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/video/
    - assets/audio/